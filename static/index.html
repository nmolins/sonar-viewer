<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonar Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0d11;
  --surface: #111318;
  --surface2: #181b22;
  --border: #1f2330;
  --border2: #2a2f40;
  --text: #d8dce8;
  --text-bright: #e8eaf0;
  --muted: #5a6070;
  --accent: #6c8bff;
  --green: #3ecf74;
  --amber: #f5a623;
  --red: #f05252;
  --teal: #38bdf8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 2.5rem 4rem;
}

/* ── Header ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 1rem;
}
header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.02em; color: #fff; }
.meta { font-family: var(--mono); font-size: .7rem; color: var(--muted); margin-top: .4rem; }

.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: .6rem; }
.hstats { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: flex-end; }
.hs {
  font-family: var(--mono); font-size: .72rem;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--muted); white-space: nowrap;
}
.hs span { font-weight: 600; margin-right: 3px; }
.hs.docker span { color: var(--teal); }
.hs.running span { color: var(--green); }
.hs.total span { color: var(--accent); }
.hs.user span { color: var(--amber); }

.header-actions { display: flex; gap: .4rem; }
.btn {
  font-family: var(--mono); font-size: .72rem;
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--muted); cursor: pointer;
  transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.btn:hover { color: var(--text); border-color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { opacity: .85; }
.btn .spin { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toolbar ── */
.toolbar {
  display: flex; gap: .75rem; margin-bottom: 2rem;
  align-items: center; flex-wrap: wrap;
}
.sw { position: relative; flex: 1; max-width: 360px; }
.sw svg {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--muted); pointer-events: none;
}
#search {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 8px;
  padding: .55rem .75rem .55rem 2.2rem;
  color: var(--text); font-family: var(--mono); font-size: .8rem;
  outline: none; transition: border-color .15s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }

.btn-group { display: flex; gap: .4rem; flex-wrap: wrap; }
.btn-group label { font-family: var(--mono); font-size: .65rem; color: var(--muted); align-self: center; margin-right: .2rem; }
.fb {
  font-family: var(--mono); font-size: .7rem;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.fb:hover { color: var(--text); }
.fb.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Categories & Grid ── */
.categories { display: flex; flex-direction: column; gap: 2.5rem; }
.cat-hd { display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem; }
.cat-icon { font-size: .9rem; }
.cat-name { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
.cat-count {
  font-family: var(--mono); font-size: .62rem;
  color: var(--accent); background: rgba(108,139,255,.1);
  border: 1px solid rgba(108,139,255,.2); border-radius: 4px; padding: 0 5px;
}
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: .6rem; }

/* ── Cards ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: .85rem 1rem;
  text-decoration: none; color: var(--text);
  display: flex; flex-direction: column; gap: .5rem;
  transition: border-color .15s, transform .1s, box-shadow .15s;
}
.card:hover {
  border-color: var(--border2); transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(0,0,0,.35);
}
.card.no-link { cursor: default; }
.card.no-link:hover { transform: none; box-shadow: none; border-color: var(--border); }

.ct { display: flex; align-items: center; gap: .6rem; }
.pp {
  font-family: var(--mono); font-size: .62rem; font-weight: 600;
  padding: 2px 7px; border-radius: 5px; flex-shrink: 0;
}
.pp.docker { background: rgba(56,189,248,.1); color: var(--teal); border: 1px solid rgba(56,189,248,.2); }
.pp.user   { background: rgba(245,166,35,.1); color: var(--amber); border: 1px solid rgba(245,166,35,.2); }
.pp.system { background: rgba(90,96,112,.15); color: var(--muted); border: 1px solid var(--border2); }
.cn {
  font-size: .85rem; font-weight: 600; color: var(--text-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.sd { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sd.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sd.stopped { background: var(--red); }
.sd.none    { background: var(--border2); }

.ci {
  font-family: var(--mono); font-size: .62rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cbw { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.cb  { height: 100%; border-radius: 2px; background: var(--green); transition: width .3s; }
.cb.warn { background: var(--amber); }
.cb.hot  { background: var(--red); }

.cstats { display: flex; gap: .6rem; flex-wrap: wrap; }
.sc {
  font-family: var(--mono); font-size: .62rem;
  display: flex; align-items: center; gap: 3px; color: var(--muted);
}
.sc .v { color: var(--text); font-weight: 600; }
.sc.ch .v { color: var(--amber); }
.sc.cr .v { color: var(--red); }

.cf { display: flex; justify-content: space-between; align-items: center; }
.ut { font-family: var(--mono); font-size: .6rem; color: var(--muted); }
.conn-badge {
  font-family: var(--mono); font-size: .6rem; color: var(--muted);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px; padding: 1px 5px;
}
.conn-badge.active { color: var(--green); border-color: rgba(62,207,116,.3); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.visible { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; padding: 1.5rem; min-width: 340px; max-width: 500px;
  width: 90%;
}
.modal h2 {
  font-size: 1rem; font-weight: 700; color: #fff;
  margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem;
}
.modal-close {
  margin-left: auto; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 1.2rem; line-height: 1;
}
.modal-close:hover { color: var(--text); }
.next-ports-list { display: flex; flex-wrap: wrap; gap: .5rem; }
.next-port {
  font-family: var(--mono); font-size: .85rem; font-weight: 600;
  padding: 6px 14px; border-radius: 8px;
  background: rgba(108,139,255,.1); border: 1px solid rgba(108,139,255,.25);
  color: var(--accent);
}
.modal-input-row { display: flex; gap: .5rem; margin-bottom: 1rem; }
.modal-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: .5rem .75rem;
  color: var(--text); font-family: var(--mono); font-size: .8rem; outline: none;
}
.modal-input:focus { border-color: var(--accent); }

/* ── Error & loading ── */
.error-banner {
  background: rgba(240,82,82,.1); border: 1px solid rgba(240,82,82,.3);
  border-radius: 10px; padding: 1rem 1.5rem;
  font-family: var(--mono); font-size: .8rem; color: var(--red);
  margin-bottom: 2rem;
}
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 4rem; color: var(--muted); font-family: var(--mono); font-size: .85rem;
}
.empty {
  text-align: center; padding: 4rem; color: var(--muted);
  font-family: var(--mono); font-size: .85rem;
}

/* ── Footer ── */
footer {
  margin-top: 4rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono); font-size: .65rem; color: var(--muted);
  display: flex; justify-content: space-between;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  body { padding: 1rem 1rem 3rem; }
  .grid { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .sw { max-width: none; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Sonar Viewer</h1>
    <div class="meta" id="meta">Loading...</div>
  </div>
  <div class="header-right">
    <div class="hstats" id="stats-bar">
      <div class="hs total"><span id="s-total">-</span>ports</div>
      <div class="hs docker"><span id="s-docker">-</span>docker</div>
      <div class="hs running"><span id="s-running">-</span>running</div>
      <div class="hs user"><span id="s-host">-</span>host</div>
    </div>
    <div class="header-actions">
      <button class="btn" id="btn-next">Ports dispo</button>
      <button class="btn primary" id="btn-refresh">
        <svg id="refresh-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="sw">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Filtrer par nom, image, port..." autocomplete="off">
  </div>
  <div class="btn-group">
    <button class="fb active" data-filter="all">Tous</button>
    <button class="fb" data-filter="docker">Docker</button>
    <button class="fb" data-filter="user">Host</button>
    <button class="fb" data-filter="system">System</button>
  </div>
  <div class="btn-group">
    <label>Tri:</label>
    <button class="fb active" data-sort="name">Nom</button>
    <button class="fb" data-sort="port">Port</button>
    <button class="fb" data-sort="cpu">CPU</button>
    <button class="fb" data-sort="ram">RAM</button>
  </div>
</div>

<div id="error-zone"></div>
<div class="categories" id="grid"></div>

<footer>
  <span>sonar-viewer</span>
  <span id="footer-time"></span>
</footer>

<!-- Next Ports Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>
      Prochains ports disponibles
      <button class="modal-close" id="modal-close">&times;</button>
    </h2>
    <div class="modal-input-row">
      <input type="number" class="modal-input" id="next-count" value="5" min="1" max="50" placeholder="Nombre de ports">
      <button class="btn primary" id="btn-find-next">Chercher</button>
    </div>
    <div id="next-ports-result" class="next-ports-list"></div>
  </div>
</div>

<script>
// ── State ──
let allPorts = [];
let currentFilter = 'all';
let currentSort = 'name';
let searchQuery = '';
let isLoading = false;

// ── Categories ──
const CATEGORIES = [
  { key: 'Media',         icon: '\uD83C\uDFAC', patterns: ['jellyfin','emby','plex','audiobookshelf','jellyseerr','overseerr','jellystat','tautulli','navidrome','kavita'] },
  { key: 'Photos',        icon: '\uD83D\uDDBC\uFE0F', patterns: ['immich','photoprism','librephotos','pigallery'] },
  { key: 'Arr',           icon: '\uD83D\uDCE1', patterns: ['sonarr','radarr','lidarr','readarr','prowlarr','bazarr','autobrr','netronome','qui','flaresolverr','recyclarr'] },
  { key: 'Download',      icon: '\u2B07\uFE0F',  patterns: ['qbittorrent','transmission','deluge','sabnzbd','nzbget','aria2','jdownloader'] },
  { key: 'Documents',     icon: '\uD83D\uDCC4', patterns: ['paperless','bentopdf','stirling','docmost','bookstack'] },
  { key: 'Productivity',  icon: '\u2705', patterns: ['vikunja','karakeep','dokuwiki','nextcloud','planka','trilium','joplin','affine'] },
  { key: 'Automation',    icon: '\uD83E\uDD16', patterns: ['n8n','nomad','node-red','nodered','homeassistant','home-assistant','huginn','mosquitto'] },
  { key: 'Dev',           icon: '\uD83D\uDCBB', patterns: ['gitea','gitlab','forgejo','code-server','overpass','goodplace','risk','postgres','mysql','redis','mongo','adminer','pgadmin'] },
  { key: 'Security',      icon: '\uD83D\uDD10', patterns: ['vaultwarden','bitwarden','pocket-id','tinyauth','authelia','authentik','keycloak','crowdsec','adguard','pihole'] },
  { key: 'Network',       icon: '\uD83C\uDF10', patterns: ['nginx','caddy','traefik','haproxy','wizarr','wg-easy','wireguard','cloudflared','unifi','speedtest'] },
  { key: 'Infra',         icon: '\u2699\uFE0F',  patterns: ['portainer','uptime-kuma','uptimekuma','wud','getwud','beszel','homepage','homarr','dashy','glances','netdata','patchpanda','watchtower','dockge'] },
  { key: 'Files',         icon: '\uD83D\uDCC1', patterns: ['filebrowser','qdirstat','resilio','syncthing','sftpgo','minio'] },
  { key: 'Personal',      icon: '\uD83D\uDC64', patterns: ['grampsweb','freshrss','miniflux','wallabag','linkding','mealie','grocy','firefly','actual'] },
];

function categorize(entry) {
  const haystack = [
    entry.docker_image || '',
    entry.docker_container || '',
    entry.docker_compose_service || '',
    entry.docker_compose_project || '',
    entry.process || ''
  ].join(' ').toLowerCase();

  for (const cat of CATEGORIES) {
    if (cat.patterns.some(p => haystack.includes(p))) return cat.key;
  }
  if (entry.type === 'system') return 'System';
  if (entry.type === 'user') return 'Host';
  return 'Other';
}

function getCatMeta(key) {
  const found = CATEGORIES.find(c => c.key === key);
  if (found) return found;
  if (key === 'System') return { key: 'System', icon: '\uD83D\uDDA5\uFE0F', patterns: [] };
  if (key === 'Host')   return { key: 'Host',   icon: '\uD83D\uDD0C', patterns: [] };
  return { key: 'Other', icon: '\u2753', patterns: [] };
}

// ── Helpers ──
function fmtBytes(b) {
  if (!b || b === 0) return '';
  if (b > 1073741824) return (b / 1073741824).toFixed(1) + 'G';
  if (b > 1048576)    return Math.round(b / 1048576) + 'M';
  return Math.round(b / 1024) + 'K';
}

function displayName(e) {
  if (e.docker_container) return e.docker_container;
  if (e.process) return e.process.replace(/\(.*/, '').trim();
  return 'Port ' + e.port;
}

function shortImage(img) {
  if (!img) return '';
  return img.replace(/.*\//, '').replace(/:.*$/, '');
}

// ── API ──
async function fetchSonar() {
  if (isLoading) return;
  isLoading = true;
  updateRefreshBtn();
  document.getElementById('error-zone').innerHTML = '';

  try {
    const res = await fetch('/api/sonar');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allPorts = data;
    document.getElementById('meta').textContent =
      `sonar list --stats --json \u00B7 ${new Date().toLocaleString('fr-FR')}`;
    document.getElementById('footer-time').textContent = new Date().toLocaleString('fr-FR');
  } catch (err) {
    document.getElementById('error-zone').innerHTML =
      `<div class="error-banner">${err.message}</div>`;
    allPorts = [];
  } finally {
    isLoading = false;
    updateRefreshBtn();
    render();
  }
}

async function fetchNext(count) {
  const result = document.getElementById('next-ports-result');
  result.innerHTML = '<span style="color:var(--muted)">Recherche...</span>';
  try {
    const res = await fetch('/api/next');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    let ports = [];
    if (Array.isArray(data.ports)) ports = data.ports;
    else if (Array.isArray(data)) ports = data;
    else if (data.port) ports = [data.port];

    // If we got ports, show up to `count`
    ports = ports.slice(0, count);

    if (ports.length === 0) {
      result.innerHTML = '<span style="color:var(--muted)">Aucun port disponible trouv\u00E9</span>';
    } else {
      result.innerHTML = ports.map(p => `<span class="next-port">:${p}</span>`).join('');
    }
  } catch (err) {
    result.innerHTML = `<span style="color:var(--red)">${err.message}</span>`;
  }
}

// ── Rendering ──
function updateRefreshBtn() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.toggle('spin', isLoading);
}

function updateStats() {
  const visible = allPorts.filter(p => passesFilters(p));
  document.getElementById('s-total').textContent = visible.length;
  document.getElementById('s-docker').textContent = allPorts.filter(p => p.type === 'docker').length;
  document.getElementById('s-running').textContent = allPorts.filter(p => p.state === 'running').length;
  document.getElementById('s-host').textContent = allPorts.filter(p => p.type === 'user').length;
}

function passesFilters(entry) {
  if (currentFilter !== 'all' && entry.type !== currentFilter) return false;
  if (searchQuery) {
    const hay = [
      String(entry.port),
      entry.process || '',
      entry.docker_container || '',
      entry.docker_image || '',
      entry.docker_compose_service || '',
      entry.docker_compose_project || '',
      displayName(entry)
    ].join(' ').toLowerCase();
    if (!hay.includes(searchQuery)) return false;
  }
  return true;
}

function sortEntries(entries) {
  const sorted = [...entries];
  switch (currentSort) {
    case 'port': sorted.sort((a, b) => a.port - b.port); break;
    case 'cpu':  sorted.sort((a, b) => (b.cpu_percent || 0) - (a.cpu_percent || 0)); break;
    case 'ram':  sorted.sort((a, b) => (b.memory_rss_bytes || 0) - (a.memory_rss_bytes || 0)); break;
    default:     sorted.sort((a, b) => displayName(a).localeCompare(displayName(b))); break;
  }
  return sorted;
}

function renderCard(e) {
  const name = displayName(e);
  const img = shortImage(e.docker_image);
  const cpu = e.cpu_percent || 0;
  const mem = e.memory_rss_bytes || 0;
  const cpuStr = cpu > 0 ? cpu.toFixed(1) + '%' : '';
  const memStr = fmtBytes(mem);
  const conn = e.connections || 0;

  let barWidth = Math.min(cpu * 10, 100);
  let barClass = '';
  let chipClass = 'sc';
  if (cpu > 5)  { barClass = 'warn'; chipClass = 'sc ch'; }
  if (cpu > 15) { barClass = 'hot';  chipClass = 'sc cr'; }

  let dotClass = 'none';
  if (e.state === 'running') dotClass = 'running';
  else if (e.state === 'stopped') dotClass = 'stopped';

  const isLink = e.type === 'docker' || e.type === 'user';
  const tag = isLink ? 'a' : 'div';
  const linkAttr = isLink && e.url ? ` href="${e.url}" target="_blank"` : '';
  const noLink = isLink ? '' : ' no-link';

  let html = `<${tag} class="card${noLink}"${linkAttr} data-type="${e.type}">`;
  html += `<div class="ct"><span class="pp ${e.type}">:${e.port}</span><span class="cn" title="${name}">${name}</span><span class="sd ${dotClass}"></span></div>`;
  if (img) html += `<div class="ci">${img}</div>`;
  if (cpuStr) html += `<div class="cbw"><div class="cb ${barClass}" style="width:${barWidth}%"></div></div>`;
  if (cpuStr || memStr) {
    html += '<div class="cstats">';
    if (cpuStr) html += `<span class="${chipClass}">CPU <span class="v">${cpuStr}</span></span>`;
    if (memStr) html += `<span class="sc">RAM <span class="v">${memStr}</span></span>`;
    html += '</div>';
  }
  if (e.uptime || conn) {
    const connClass = conn > 0 ? 'conn-badge active' : 'conn-badge';
    html += `<div class="cf"><span class="ut">${e.uptime || ''}</span><span class="${connClass}">${conn} conn</span></div>`;
  }
  html += `</${tag}>`;
  return html;
}

function render() {
  const filtered = allPorts.filter(passesFilters);
  const sorted = sortEntries(filtered);

  // Group by category
  const groups = {};
  for (const entry of sorted) {
    const cat = categorize(entry);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(entry);
  }

  // Category order
  const catOrder = [
    ...CATEGORIES.map(c => c.key),
    'System', 'Host', 'Other'
  ];

  const grid = document.getElementById('grid');

  if (sorted.length === 0 && allPorts.length > 0) {
    grid.innerHTML = '<div class="empty">Aucun r\u00E9sultat pour ce filtre.</div>';
    updateStats();
    return;
  }
  if (allPorts.length === 0 && !isLoading) {
    grid.innerHTML = '<div class="empty">Aucune donn\u00E9e. Cliquez sur Refresh.</div>';
    updateStats();
    return;
  }

  let html = '';
  for (const catKey of catOrder) {
    const entries = groups[catKey];
    if (!entries || entries.length === 0) continue;
    const meta = getCatMeta(catKey);
    html += `<div class="category">`;
    html += `<div class="cat-hd"><span class="cat-icon">${meta.icon}</span><span class="cat-name">${catKey}</span><span class="cat-count">${entries.length}</span></div>`;
    html += `<div class="grid">`;
    for (const e of entries) html += renderCard(e);
    html += '</div></div>';
  }

  grid.innerHTML = html;
  updateStats();
}

// ── Events ──
document.addEventListener('DOMContentLoaded', () => {
  fetchSonar();

  document.getElementById('btn-refresh').addEventListener('click', fetchSonar);

  // Search
  let debounce;
  document.getElementById('search').addEventListener('input', (e) => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      searchQuery = e.target.value.toLowerCase().trim();
      render();
    }, 150);
  });

  // Filter buttons
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  // Sort buttons
  document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      render();
    });
  });

  // Next ports modal
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('btn-next').addEventListener('click', () => {
    overlay.classList.add('visible');
    document.getElementById('next-ports-result').innerHTML = '';
  });
  document.getElementById('modal-close').addEventListener('click', () => {
    overlay.classList.remove('visible');
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('visible');
  });
  document.getElementById('btn-find-next').addEventListener('click', () => {
    const count = parseInt(document.getElementById('next-count').value) || 5;
    fetchNext(count);
  });
});
</script>
</body>
</html>
