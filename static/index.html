<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonar Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0d11;
  --surface: #111318;
  --surface2: #181b22;
  --border: #1f2330;
  --border2: #2a2f40;
  --text: #d8dce8;
  --text-bright: #e8eaf0;
  --muted: #5a6070;
  --accent: #6c8bff;
  --green: #3ecf74;
  --amber: #f5a623;
  --red: #f05252;
  --teal: #38bdf8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 2.5rem 4rem;
}

/* ── Header ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 1rem;
}
header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.02em; color: #fff; }
.meta { font-family: var(--mono); font-size: .7rem; color: var(--muted); margin-top: .4rem; }

.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: .6rem; }
.hstats { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: flex-end; }
.hs {
  font-family: var(--mono); font-size: .72rem;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--muted); white-space: nowrap;
}
.hs span { font-weight: 600; margin-right: 3px; }
.hs.docker span { color: var(--teal); }
.hs.running span { color: var(--green); }
.hs.total span { color: var(--accent); }
.hs.user span { color: var(--amber); }

.header-actions { display: flex; gap: .4rem; }
.btn {
  font-family: var(--mono); font-size: .72rem;
  padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--muted); cursor: pointer;
  transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.btn:hover { color: var(--text); border-color: var(--accent); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { opacity: .85; }
.btn .spin { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toolbar ── */
.toolbar {
  display: flex; gap: .75rem; margin-bottom: 2rem;
  align-items: center; flex-wrap: wrap;
}
.sw { position: relative; flex: 1; max-width: 360px; }
.sw svg {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--muted); pointer-events: none;
}
#search {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 8px;
  padding: .55rem .75rem .55rem 2.2rem;
  color: var(--text); font-family: var(--mono); font-size: .8rem;
  outline: none; transition: border-color .15s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }

.btn-group { display: flex; gap: .4rem; flex-wrap: wrap; }
.btn-group label { font-family: var(--mono); font-size: .65rem; color: var(--muted); align-self: center; margin-right: .2rem; }
.fb {
  font-family: var(--mono); font-size: .7rem;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.fb:hover { color: var(--text); }
.fb.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Light theme ── */
.light {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --surface2: #eef0f4;
  --border: #dde0e6;
  --border2: #c8ccd4;
  --text: #2c3040;
  --text-bright: #1a1e2e;
  --muted: #6b7080;
  --accent: #4a6aef;
  --green: #2aad5a;
  --amber: #d48a10;
  --red: #d93c3c;
  --teal: #1a8fc4;
}
.light header h1 { color: var(--text-bright); }
.light .card { box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.light .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
.light .modal { box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.light .pp.docker { background: rgba(26,143,196,.08); border-color: rgba(26,143,196,.2); }
.light .pp.user   { background: rgba(212,138,16,.08); border-color: rgba(212,138,16,.2); }
.light .pp.system { background: rgba(107,112,128,.08); border-color: rgba(107,112,128,.2); }

/* ── Toggle switch ── */
.toggle-wrap {
  display: flex; align-items: center; gap: .5rem;
}
.toggle-label { font-family: var(--mono); font-size: .65rem; color: var(--muted); }
.toggle {
  position: relative; width: 32px; height: 18px;
  background: var(--border2); border-radius: 9px;
  cursor: pointer; transition: background .2s;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff; transition: transform .2s;
}
.toggle.on::after { transform: translateX(14px); }

/* ── Categories & Grid ── */
.categories { display: flex; flex-direction: column; gap: 2.5rem; }
.cat-hd { display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem; }
.cat-icon { font-size: .9rem; }
.cat-name { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
.cat-count {
  font-family: var(--mono); font-size: .62rem;
  color: var(--accent); background: rgba(108,139,255,.1);
  border: 1px solid rgba(108,139,255,.2); border-radius: 4px; padding: 0 5px;
}
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: .6rem; }

/* ── Cards ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: .85rem 1rem;
  color: var(--text);
  display: flex; flex-direction: column; gap: .5rem;
  transition: border-color .15s, box-shadow .15s;
}
.card:hover {
  border-color: var(--border2);
  box-shadow: 0 6px 24px rgba(0,0,0,.35);
}

/* ── Card action buttons ── */
.card-actions {
  display: flex; gap: .4rem; margin-top: .2rem;
}
.card-actions .action-btn {
  font-family: var(--mono); font-size: .62rem; font-weight: 600;
  padding: 3px 10px; border-radius: 5px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--muted); cursor: pointer; transition: all .15s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}
.card-actions .action-btn:hover { color: var(--text); border-color: var(--accent); }
.card-actions .action-btn.open-btn:hover { color: var(--accent); }
.card-actions .action-btn.log-btn:hover { color: var(--teal); border-color: var(--teal); }

.ct { display: flex; align-items: center; gap: .6rem; }
.pp {
  font-family: var(--mono); font-size: .62rem; font-weight: 600;
  padding: 2px 7px; border-radius: 5px; flex-shrink: 0;
}
.pp.docker { background: rgba(56,189,248,.1); color: var(--teal); border: 1px solid rgba(56,189,248,.2); }
.pp.user   { background: rgba(245,166,35,.1); color: var(--amber); border: 1px solid rgba(245,166,35,.2); }
.pp.system { background: rgba(90,96,112,.15); color: var(--muted); border: 1px solid var(--border2); }
.cn {
  font-size: .85rem; font-weight: 600; color: var(--text-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.sd { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sd.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sd.stopped { background: var(--red); }
.sd.none    { background: var(--border2); }

.ci {
  font-family: var(--mono); font-size: .62rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cbw { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.cb  { height: 100%; border-radius: 2px; background: var(--green); transition: width .3s; }
.cb.warn { background: var(--amber); }
.cb.hot  { background: var(--red); }

.cstats { display: flex; gap: .6rem; flex-wrap: wrap; }
.sc {
  font-family: var(--mono); font-size: .62rem;
  display: flex; align-items: center; gap: 3px; color: var(--muted);
}
.sc .v { color: var(--text); font-weight: 600; }
.sc.ch .v { color: var(--amber); }
.sc.cr .v { color: var(--red); }

.cf { display: flex; justify-content: space-between; align-items: center; }
.ut { font-family: var(--mono); font-size: .6rem; color: var(--muted); }
.conn-badge {
  font-family: var(--mono); font-size: .6rem; color: var(--muted);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px; padding: 1px 5px;
}
.conn-badge.active { color: var(--green); border-color: rgba(62,207,116,.3); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.visible { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; padding: 1.5rem; min-width: 340px; max-width: 500px;
  width: 90%;
}
.modal h2 {
  font-size: 1rem; font-weight: 700; color: #fff;
  margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem;
}
.modal-close {
  margin-left: auto; background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 1.2rem; line-height: 1;
}
.modal-close:hover { color: var(--text); }
.next-ports-list { display: flex; flex-wrap: wrap; gap: .5rem; }
.next-port {
  font-family: var(--mono); font-size: .85rem; font-weight: 600;
  padding: 6px 14px; border-radius: 8px;
  background: rgba(108,139,255,.1); border: 1px solid rgba(108,139,255,.25);
  color: var(--accent);
}
.modal-input-row { display: flex; gap: .5rem; margin-bottom: 1rem; }
.modal-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: .5rem .75rem;
  color: var(--text); font-family: var(--mono); font-size: .8rem; outline: none;
}
.modal-input:focus { border-color: var(--accent); }

/* ── Error & loading ── */
.error-banner {
  background: rgba(240,82,82,.1); border: 1px solid rgba(240,82,82,.3);
  border-radius: 10px; padding: 1rem 1.5rem;
  font-family: var(--mono); font-size: .8rem; color: var(--red);
  margin-bottom: 2rem;
}
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 4rem; color: var(--muted); font-family: var(--mono); font-size: .85rem;
}
.empty {
  text-align: center; padding: 4rem; color: var(--muted);
  font-family: var(--mono); font-size: .85rem;
}

/* ── Theme toggle icon ── */
.icon-btn {
  background: none; border: 1px solid var(--border2); border-radius: 6px;
  color: var(--muted); cursor: pointer; padding: 4px 6px;
  display: flex; align-items: center; transition: all .15s;
}
.icon-btn:hover { color: var(--text); border-color: var(--accent); }
.icon-btn svg { display: block; }

/* ── View mode toggle ── */
.view-btns { display: flex; gap: 0; }
.view-btn {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--muted); cursor: pointer; padding: 4px 8px;
  display: flex; align-items: center; transition: all .15s;
}
.view-btn:first-child { border-radius: 6px 0 0 6px; }
.view-btn:last-child { border-radius: 0 6px 6px 0; border-left: none; }
.view-btn:hover { color: var(--text); }
.view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── List view ── */
.list-view { display: flex; flex-direction: column; gap: 2px; }
.list-row {
  display: grid;
  grid-template-columns: 55px 2fr 1.5fr 55px 55px 70px 45px auto;
  align-items: center; gap: .4rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: .4rem .7rem;
  text-decoration: none; color: var(--text);
  font-family: var(--mono); font-size: .72rem;
  transition: border-color .15s;
}
.list-row:hover { border-color: var(--border2); }
.list-head {
  display: grid;
  grid-template-columns: 55px 2fr 1.5fr 55px 55px 70px 45px auto;
  gap: .4rem; padding: .3rem .7rem;
  font-family: var(--mono); font-size: .6rem; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
}
.list-row .lr-name {
  font-family: var(--sans); font-weight: 600; font-size: .8rem;
  color: var(--text-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: .4rem;
  min-width: 0;
}
.list-row .lr-val { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.list-row .lr-val.green { color: var(--green); }
.list-row .lr-val.amber { color: var(--amber); }
.list-row .lr-val.red { color: var(--red); }

@media (max-width: 900px) {
  .list-row, .list-head {
    grid-template-columns: 50px 2fr 50px 50px 60px auto;
  }
  .list-head .lh-image, .list-head .lh-conn,
  .list-row .lr-image, .list-row .lr-conn { display: none; }
}

/* ── Log modal ── */
.log-modal {
  max-width: 800px; width: 95%;
}
.log-modal h2 { font-size: .9rem; }
.log-content {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem;
  font-family: var(--mono); font-size: .68rem; line-height: 1.5;
  color: var(--text); max-height: 60vh; overflow: auto;
  white-space: pre-wrap; word-break: break-all;
}
.log-toolbar {
  display: flex; gap: .5rem; margin-bottom: .75rem; align-items: center;
}
.log-toolbar .btn { font-size: .65rem; }
.log-lines { color: var(--muted); font-family: var(--mono); font-size: .62rem; }

/* ── List view action buttons ── */
.list-row .list-actions {
  display: flex; gap: .3rem; justify-content: flex-end;
}
.list-row .action-btn {
  font-family: var(--mono); font-size: .58rem; font-weight: 600;
  padding: 2px 7px; border-radius: 4px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--muted); cursor: pointer; transition: all .15s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 3px;
}
.list-row .action-btn:hover { color: var(--text); border-color: var(--accent); }
.list-row .action-btn.open-btn:hover { color: var(--accent); }
.list-row .action-btn.log-btn:hover { color: var(--teal); border-color: var(--teal); }

/* ── Edit modal ── */
.edit-modal { max-width: 420px; }
.edit-modal h2 { font-size: .9rem; margin-bottom: .75rem; }
.edit-field { margin-bottom: .75rem; }
.edit-field label {
  display: block; font-family: var(--mono); font-size: .62rem;
  color: var(--muted); margin-bottom: .25rem; text-transform: uppercase;
  letter-spacing: .05em;
}
.edit-field input, .edit-field select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: .5rem .75rem;
  color: var(--text); font-family: var(--mono); font-size: .8rem; outline: none;
}
.edit-field input:focus, .edit-field select:focus { border-color: var(--accent); }
.edit-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem; }
.edit-actions .btn.danger { color: var(--red); border-color: rgba(240,82,82,.3); }
.edit-actions .btn.danger:hover { background: rgba(240,82,82,.1); }
.edit-saved {
  font-family: var(--mono); font-size: .65rem; color: var(--green);
  opacity: 0; transition: opacity .3s; align-self: center;
}
.edit-saved.show { opacity: 1; }

/* ── Footer ── */
footer {
  margin-top: 4rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono); font-size: .65rem; color: var(--muted);
  display: flex; justify-content: space-between;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  body { padding: 1rem 1rem 3rem; }
  .grid { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .sw { max-width: none; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Sonar Viewer</h1>
    <div class="meta" id="meta">Loading...</div>
  </div>
  <div class="header-right">
    <div class="hstats" id="stats-bar">
      <div class="hs total"><span id="s-total">-</span>ports</div>
      <div class="hs docker"><span id="s-docker">-</span>docker</div>
      <div class="hs running"><span id="s-running">-</span>running</div>
      <div class="hs user"><span id="s-host">-</span>host</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-theme" title="Changer le theme">
        <svg id="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg id="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="btn" id="btn-next">Ports dispo</button>
      <button class="btn primary" id="btn-refresh">
        <svg id="refresh-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="sw">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Filtrer par nom, image, port..." autocomplete="off">
  </div>
  <div class="btn-group">
    <button class="fb active" data-filter="all">Tous</button>
    <button class="fb" data-filter="docker">Docker</button>
    <button class="fb" data-filter="user">Host</button>
    <button class="fb" data-filter="system">System</button>
  </div>
  <div class="btn-group">
    <label>Tri:</label>
    <button class="fb active" data-sort="name">Nom</button>
    <button class="fb" data-sort="port">Port</button>
    <button class="fb" data-sort="cpu">CPU</button>
    <button class="fb" data-sort="ram">RAM</button>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label">Categories</span>
    <div class="toggle on" id="toggle-cats"></div>
  </div>
  <div class="view-btns">
    <button class="view-btn active" id="view-cards" title="Cards">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <button class="view-btn" id="view-list" title="Liste">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    </button>
  </div>
</div>

<div id="error-zone"></div>
<div class="categories" id="grid"></div>

<footer>
  <span>sonar-viewer</span>
  <span id="footer-time"></span>
</footer>

<!-- Next Ports Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>
      Prochains ports disponibles
      <button class="modal-close" id="modal-close">&times;</button>
    </h2>
    <div class="modal-input-row">
      <input type="number" class="modal-input" id="next-from" placeholder="A partir du port (ex: 3000)" min="1" max="65535">
      <button class="btn primary" id="btn-find-next">Chercher</button>
    </div>
    <div id="next-ports-result" class="next-ports-list"></div>
  </div>
</div>

<!-- Logs Modal -->
<div class="modal-overlay" id="logs-overlay">
  <div class="modal log-modal">
    <h2>
      <span id="logs-title">Logs</span>
      <button class="modal-close" id="logs-close">&times;</button>
    </h2>
    <div class="log-toolbar">
      <button class="btn" id="logs-refresh">Refresh</button>
      <select class="modal-input" id="logs-tail" style="flex:0;width:auto;padding:4px 8px;font-size:.7rem">
        <option value="50">50 lignes</option>
        <option value="200" selected>200 lignes</option>
        <option value="500">500 lignes</option>
        <option value="1000">1000 lignes</option>
      </select>
      <span class="log-lines" id="logs-count"></span>
    </div>
    <div class="log-content" id="logs-content">
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-overlay">
  <div class="modal edit-modal">
    <h2>
      <span id="edit-title">Modifier</span>
      <button class="modal-close" id="edit-close">&times;</button>
    </h2>
    <div class="edit-field">
      <label>Nom personnalise</label>
      <input type="text" id="edit-name" placeholder="Laisser vide pour le nom par defaut">
    </div>
    <div class="edit-field">
      <label>Description</label>
      <input type="text" id="edit-desc" placeholder="Ex: API interne, service de backup...">
    </div>
    <div class="edit-field">
      <label>Categorie</label>
      <select id="edit-cat">
        <option value="">Auto (par defaut)</option>
      </select>
    </div>
    <div class="edit-actions">
      <button class="btn danger" id="edit-reset">Reset</button>
      <span class="edit-saved" id="edit-saved">Sauvegarde !</span>
      <button class="btn primary" id="edit-save">Sauvegarder</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let allPorts = [];
let currentFilter = 'all';
let currentSort = 'name';
let searchQuery = '';
let isLoading = false;
let groupByCategory = true;
let viewMode = 'cards'; // 'cards' | 'list'
let config = { overrides: {} };

// ── Categories ──
const CATEGORIES = [
  { key: 'Media',         icon: '\uD83C\uDFAC', patterns: ['jellyfin','emby','plex','audiobookshelf','jellyseerr','overseerr','jellystat','tautulli','navidrome','kavita'] },
  { key: 'Photos',        icon: '\uD83D\uDDBC\uFE0F', patterns: ['immich','photoprism','librephotos','pigallery'] },
  { key: 'Arr',           icon: '\uD83D\uDCE1', patterns: ['sonarr','radarr','lidarr','readarr','prowlarr','bazarr','autobrr','netronome','qui','flaresolverr','recyclarr'] },
  { key: 'Download',      icon: '\u2B07\uFE0F',  patterns: ['qbittorrent','transmission','deluge','sabnzbd','nzbget','aria2','jdownloader'] },
  { key: 'Documents',     icon: '\uD83D\uDCC4', patterns: ['paperless','bentopdf','stirling','docmost','bookstack'] },
  { key: 'Productivity',  icon: '\u2705', patterns: ['vikunja','karakeep','dokuwiki','nextcloud','planka','trilium','joplin','affine'] },
  { key: 'Automation',    icon: '\uD83E\uDD16', patterns: ['n8n','nomad','node-red','nodered','homeassistant','home-assistant','huginn','mosquitto'] },
  { key: 'Dev',           icon: '\uD83D\uDCBB', patterns: ['gitea','gitlab','forgejo','code-server','overpass','goodplace','risk','postgres','mysql','redis','mongo','adminer','pgadmin'] },
  { key: 'Security',      icon: '\uD83D\uDD10', patterns: ['vaultwarden','bitwarden','pocket-id','tinyauth','authelia','authentik','keycloak','crowdsec','adguard','pihole'] },
  { key: 'Network',       icon: '\uD83C\uDF10', patterns: ['nginx','caddy','traefik','haproxy','wizarr','wg-easy','wireguard','cloudflared','unifi','speedtest'] },
  { key: 'Infra',         icon: '\u2699\uFE0F',  patterns: ['portainer','uptime-kuma','uptimekuma','wud','getwud','beszel','homepage','homarr','dashy','glances','netdata','patchpanda','watchtower','dockge'] },
  { key: 'Files',         icon: '\uD83D\uDCC1', patterns: ['filebrowser','qdirstat','resilio','syncthing','sftpgo','minio'] },
  { key: 'Personal',      icon: '\uD83D\uDC64', patterns: ['grampsweb','freshrss','miniflux','wallabag','linkding','mealie','grocy','firefly','actual'] },
];

function categorize(entry) {
  const ov = config.overrides[String(entry.port)];
  if (ov && ov.category) return ov.category;

  const haystack = [
    entry.docker_image || '',
    entry.docker_container || '',
    entry.docker_compose_service || '',
    entry.docker_compose_project || '',
    entry.process || ''
  ].join(' ').toLowerCase();

  for (const cat of CATEGORIES) {
    if (cat.patterns.some(p => haystack.includes(p))) return cat.key;
  }
  if (entry.type === 'system') return 'System';
  if (entry.type === 'user') return 'Host';
  return 'Other';
}

function getCatMeta(key) {
  const found = CATEGORIES.find(c => c.key === key);
  if (found) return found;
  if (key === 'System') return { key: 'System', icon: '\uD83D\uDDA5\uFE0F', patterns: [] };
  if (key === 'Host')   return { key: 'Host',   icon: '\uD83D\uDD0C', patterns: [] };
  return { key: 'Other', icon: '\u2753', patterns: [] };
}

// ── Well-known ports ──
const KNOWN_PORTS = {
  // Standard
  20: 'FTP (data)', 21: 'FTP', 22: 'SSH', 23: 'Telnet', 25: 'SMTP',
  53: 'DNS', 67: 'DHCP', 68: 'DHCP', 69: 'TFTP', 80: 'HTTP',
  110: 'POP3', 119: 'NNTP', 123: 'NTP', 135: 'RPC', 137: 'NetBIOS',
  138: 'NetBIOS', 139: 'NetBIOS', 143: 'IMAP', 161: 'SNMP', 162: 'SNMP Trap',
  389: 'LDAP', 443: 'HTTPS', 445: 'SMB', 465: 'SMTPS', 514: 'Syslog',
  587: 'SMTP (submission)', 636: 'LDAPS', 993: 'IMAPS', 995: 'POP3S',
  1080: 'SOCKS', 1433: 'MSSQL', 1434: 'MSSQL Browser',
  1521: 'Oracle DB', 1883: 'MQTT', 2049: 'NFS',
  3306: 'MySQL', 3389: 'RDP', 5432: 'PostgreSQL',
  5353: 'mDNS', 5672: 'AMQP', 5900: 'VNC', 6379: 'Redis',
  6443: 'Kubernetes API', 8443: 'HTTPS (alt)', 8883: 'MQTT (TLS)',
  9090: 'Prometheus', 9200: 'Elasticsearch', 9300: 'Elasticsearch',
  11211: 'Memcached', 27017: 'MongoDB',
  // Homelab / Media
  2283: 'Immich', 3579: 'Ombi', 5055: 'Jellyseerr/Overseerr',
  7878: 'Radarr', 8096: 'Jellyfin', 8097: 'Jellyfin (HTTPS)',
  8920: 'Jellyfin (HTTPS)', 8989: 'Sonarr', 6767: 'Bazarr',
  8686: 'Lidarr', 8787: 'Readarr', 9696: 'Prowlarr',
  32400: 'Plex', 32469: 'Plex DLNA',
  8324: 'Plex Companion', 13378: 'Audiobookshelf',
  // Homelab / Download
  6881: 'BitTorrent', 8080: 'HTTP (alt)', 8085: 'qBittorrent',
  9091: 'Transmission', 8112: 'Deluge', 51413: 'Transmission (peer)',
  // Homelab / Infra
  3100: 'Loki', 8081: 'HTTP (alt)', 9000: 'Portainer',
  9443: 'Portainer (HTTPS)', 3001: 'Uptime Kuma / Homepage',
  8088: 'Various (HASS/Syncthing)', 19999: 'Netdata',
  // Homelab / Network
  81: 'Nginx Proxy Manager', 8181: 'Traefik Dashboard',
  51820: 'WireGuard', 51821: 'wg-easy UI',
  // Homelab / Automation
  1880: 'Node-RED', 5678: 'n8n', 8123: 'Home Assistant',
  // Homelab / Security
  8222: 'Vaultwarden', 8843: 'UniFi Portal',
  // Homelab / Docs & Productivity
  8000: 'Paperless-ngx', 3456: 'Vikunja',
  // Homelab / Files
  8384: 'Syncthing', 22000: 'Syncthing (transfer)',
};

function portDescription(port) {
  return KNOWN_PORTS[port] || '';
}

// ── Helpers ──
function fmtBytes(b) {
  if (!b || b === 0) return '';
  if (b > 1073741824) return (b / 1073741824).toFixed(1) + 'G';
  if (b > 1048576)    return Math.round(b / 1048576) + 'M';
  return Math.round(b / 1024) + 'K';
}

function displayName(e) {
  const ov = config.overrides[String(e.port)];
  if (ov && ov.name) return ov.name;
  if (e.docker_container) return e.docker_container;
  if (e.process) return e.process.replace(/\(.*/, '').trim();
  return 'Port ' + e.port;
}

function getDescription(e) {
  const ov = config.overrides[String(e.port)];
  return (ov && ov.description) || '';
}

function shortImage(img) {
  if (!img) return '';
  return img.replace(/.*\//, '').replace(/:.*$/, '');
}

// ── API ──
async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    const data = await res.json();
    if (!data.error) config = data;
  } catch (e) { /* ignore */ }
}

async function fetchSonar() {
  if (isLoading) return;
  isLoading = true;
  updateRefreshBtn();
  document.getElementById('error-zone').innerHTML = '';

  try {
    await loadConfig();
    const res = await fetch('/api/sonar');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allPorts = data;
    document.getElementById('meta').textContent =
      `sonar list --stats --json \u00B7 ${new Date().toLocaleString('fr-FR')}`;
    document.getElementById('footer-time').textContent = new Date().toLocaleString('fr-FR');
  } catch (err) {
    document.getElementById('error-zone').innerHTML =
      `<div class="error-banner">${err.message}</div>`;
    allPorts = [];
  } finally {
    isLoading = false;
    updateRefreshBtn();
    render();
  }
}

async function fetchNext(fromPort) {
  const result = document.getElementById('next-ports-result');
  result.innerHTML = '<span style="color:var(--muted)">Recherche...</span>';
  try {
    let url = '/api/next';
    if (fromPort) url += `?from=${fromPort}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    let ports = [];
    if (Array.isArray(data.ports)) ports = data.ports;
    else if (Array.isArray(data)) ports = data;
    else if (data.port) ports = [data.port];

    if (ports.length === 0) {
      result.innerHTML = '<span style="color:var(--muted)">Aucun port disponible trouv\u00E9</span>';
    } else {
      result.innerHTML = ports.map(p => `<span class="next-port">:${p}</span>`).join('');
    }
  } catch (err) {
    result.innerHTML = `<span style="color:var(--red)">${err.message}</span>`;
  }
}

// ── Rendering ──
function updateRefreshBtn() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.toggle('spin', isLoading);
}

function updateStats() {
  const visible = allPorts.filter(p => passesFilters(p));
  document.getElementById('s-total').textContent = visible.length;
  document.getElementById('s-docker').textContent = allPorts.filter(p => p.type === 'docker').length;
  document.getElementById('s-running').textContent = allPorts.filter(p => p.state === 'running').length;
  document.getElementById('s-host').textContent = allPorts.filter(p => p.type === 'user').length;
}

function passesFilters(entry) {
  if (currentFilter !== 'all' && entry.type !== currentFilter) return false;
  if (searchQuery) {
    const hay = [
      String(entry.port),
      entry.process || '',
      entry.docker_container || '',
      entry.docker_image || '',
      entry.docker_compose_service || '',
      entry.docker_compose_project || '',
      displayName(entry)
    ].join(' ').toLowerCase();
    if (!hay.includes(searchQuery)) return false;
  }
  return true;
}

function sortEntries(entries) {
  const sorted = [...entries];
  switch (currentSort) {
    case 'port': sorted.sort((a, b) => a.port - b.port); break;
    case 'cpu':  sorted.sort((a, b) => (b.cpu_percent || 0) - (a.cpu_percent || 0)); break;
    case 'ram':  sorted.sort((a, b) => (b.memory_rss_bytes || 0) - (a.memory_rss_bytes || 0)); break;
    default:     sorted.sort((a, b) => displayName(a).localeCompare(displayName(b))); break;
  }
  return sorted;
}

function renderCard(e) {
  const name = displayName(e);
  const img = shortImage(e.docker_image);
  const cpu = e.cpu_percent || 0;
  const mem = e.memory_rss_bytes || 0;
  const cpuStr = cpu > 0 ? cpu.toFixed(1) + '%' : '';
  const memStr = fmtBytes(mem);
  const conn = e.connections || 0;

  let barWidth = Math.min(cpu * 10, 100);
  let barClass = '';
  let chipClass = 'sc';
  if (cpu > 5)  { barClass = 'warn'; chipClass = 'sc ch'; }
  if (cpu > 15) { barClass = 'hot';  chipClass = 'sc cr'; }

  let dotClass = 'none';
  if (e.state === 'running') dotClass = 'running';
  else if (e.state === 'stopped') dotClass = 'stopped';

  let html = `<div class="card" data-type="${e.type}">`;
  html += `<div class="ct"><span class="pp ${e.type}">:${e.port}</span><span class="cn" title="${name}">${name}</span><span class="sd ${dotClass}"></span></div>`;
  const customDesc = getDescription(e);
  const desc = portDescription(e.port);
  const proc = !img && e.process ? e.process : '';
  const cmd = !img && e.command ? e.command : '';
  const subtitle = customDesc
    ? (img ? img + ' \u00B7 ' + customDesc : customDesc)
    : img
      ? img + (desc ? ' \u00B7 ' + desc : '')
      : [proc, desc].filter(Boolean).join(' \u00B7 ');
  if (subtitle) html += `<div class="ci" title="${cmd || ''}">${subtitle}</div>`;
  if (cpuStr) html += `<div class="cbw"><div class="cb ${barClass}" style="width:${barWidth}%"></div></div>`;
  if (cpuStr || memStr) {
    html += '<div class="cstats">';
    if (cpuStr) html += `<span class="${chipClass}">CPU <span class="v">${cpuStr}</span></span>`;
    if (memStr) html += `<span class="sc">RAM <span class="v">${memStr}</span></span>`;
    html += '</div>';
  }
  if (e.uptime || conn) {
    const connClass = conn > 0 ? 'conn-badge active' : 'conn-badge';
    html += `<div class="cf"><span class="ut">${e.uptime || ''}</span><span class="${connClass}">${conn} conn</span></div>`;
  }
  // Action buttons
  html += '<div class="card-actions">';
  html += `<button class="action-btn" onclick="openEdit(${e.port})">Edit</button>`;
  if (e.url) html += `<a class="action-btn open-btn" href="${e.url}" target="_blank" onclick="event.stopPropagation()">Open</a>`;
  if (e.url) html += `<button class="action-btn" onclick="copyUrl('${e.url}', this)">Copy</button>`;
  if (e.type === 'docker' && e.docker_container) {
    html += `<button class="action-btn log-btn" onclick="openLogs('${e.docker_container.replace(/'/g, "\\'")}')">Log</button>`;
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function renderListRow(e) {
  const name = displayName(e);
  const img = shortImage(e.docker_image);
  const cpu = e.cpu_percent || 0;
  const mem = e.memory_rss_bytes || 0;
  const cpuStr = cpu > 0 ? cpu.toFixed(1) + '%' : '-';
  const memStr = fmtBytes(mem) || '-';
  const conn = e.connections || 0;

  let cpuClass = 'lr-val';
  if (cpu > 5) cpuClass += ' amber';
  if (cpu > 15) cpuClass += ' red';

  let dotClass = 'none';
  if (e.state === 'running') dotClass = 'running';
  else if (e.state === 'stopped') dotClass = 'stopped';

  let actions = '<span class="list-actions">';
  actions += `<button class="action-btn" onclick="openEdit(${e.port})">Edit</button>`;
  if (e.url) actions += `<a class="action-btn open-btn" href="${e.url}" target="_blank" onclick="event.stopPropagation()">Open</a>`;
  if (e.url) actions += `<button class="action-btn" onclick="copyUrl('${e.url}', this)">Copy</button>`;
  if (e.type === 'docker' && e.docker_container) {
    actions += `<button class="action-btn log-btn" onclick="openLogs('${e.docker_container.replace(/'/g, "\\'")}')">Log</button>`;
  }
  actions += '</span>';

  return `<div class="list-row">` +
    `<span class="pp ${e.type}">:${e.port}</span>` +
    `<span class="lr-name"><span class="sd ${dotClass}"></span>${name}</span>` +
    `<span class="lr-val lr-image">${img || getDescription(e) || e.process || portDescription(e.port) || '-'}</span>` +
    `<span class="${cpuClass}">${cpuStr}</span>` +
    `<span class="lr-val">${memStr}</span>` +
    `<span class="lr-val">${e.uptime || '-'}</span>` +
    `<span class="lr-val lr-conn">${conn}</span>` +
    actions +
    `</div>`;
}

const LIST_HEAD = '<div class="list-head">' +
  '<span>Port</span><span>Nom</span><span class="lh-image">Image</span>' +
  '<span>CPU</span><span>RAM</span><span>Uptime</span><span class="lh-conn">Conn</span><span></span></div>';

function renderEntries(entries) {
  if (viewMode === 'list') {
    return LIST_HEAD + '<div class="list-view">' + entries.map(renderListRow).join('') + '</div>';
  }
  return '<div class="grid">' + entries.map(renderCard).join('') + '</div>';
}

function render() {
  const filtered = allPorts.filter(passesFilters);
  const sorted = sortEntries(filtered);

  // Group by category
  const groups = {};
  for (const entry of sorted) {
    const cat = categorize(entry);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(entry);
  }

  // Category order
  const catOrder = [
    ...CATEGORIES.map(c => c.key),
    'System', 'Host', 'Other'
  ];

  const grid = document.getElementById('grid');

  if (sorted.length === 0 && allPorts.length > 0) {
    grid.innerHTML = '<div class="empty">Aucun r\u00E9sultat pour ce filtre.</div>';
    updateStats();
    return;
  }
  if (allPorts.length === 0 && !isLoading) {
    grid.innerHTML = '<div class="empty">Aucune donn\u00E9e. Cliquez sur Refresh.</div>';
    updateStats();
    return;
  }

  let html = '';
  if (groupByCategory) {
    for (const catKey of catOrder) {
      const entries = groups[catKey];
      if (!entries || entries.length === 0) continue;
      const meta = getCatMeta(catKey);
      html += `<div class="category">`;
      html += `<div class="cat-hd"><span class="cat-icon">${meta.icon}</span><span class="cat-name">${catKey}</span><span class="cat-count">${entries.length}</span></div>`;
      html += renderEntries(entries);
      html += '</div>';
    }
  } else {
    html += renderEntries(sorted);
  }

  grid.innerHTML = html;
  updateStats();
}

// ── Copy ──
function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'OK !';
    setTimeout(() => btn.textContent = orig, 1200);
  });
}

// ── Logs ──
let currentLogContainer = null;

function openLogs(container) {
  currentLogContainer = container;
  document.getElementById('logs-title').textContent = `Logs — ${container}`;
  document.getElementById('logs-content').textContent = 'Chargement...';
  document.getElementById('logs-count').textContent = '';
  document.getElementById('logs-overlay').classList.add('visible');
  fetchLogs();
}

async function fetchLogs() {
  if (!currentLogContainer) return;
  const tail = document.getElementById('logs-tail').value;
  const content = document.getElementById('logs-content');
  content.textContent = 'Chargement...';
  try {
    const res = await fetch(`/api/logs?container=${encodeURIComponent(currentLogContainer)}&tail=${tail}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    content.textContent = data.logs || '(vide)';
    const lines = (data.logs || '').split('\n').filter(l => l).length;
    document.getElementById('logs-count').textContent = `${lines} lignes`;
    // Scroll to bottom
    content.scrollTop = content.scrollHeight;
  } catch (err) {
    content.textContent = `Erreur: ${err.message}`;
  }
}

// ── Edit ──
let editPort = null;
const ALL_CATS = [...CATEGORIES.map(c => c.key), 'System', 'Host', 'Other'];

function openEdit(port) {
  editPort = port;
  const entry = allPorts.find(e => e.port === port);
  const ov = config.overrides[String(port)] || {};
  const defaultName = entry
    ? (entry.docker_container || (entry.process || '').replace(/\(.*/, '').trim() || 'Port ' + port)
    : 'Port ' + port;

  document.getElementById('edit-title').textContent = `Modifier :${port} — ${defaultName}`;
  document.getElementById('edit-name').value = ov.name || '';
  document.getElementById('edit-name').placeholder = defaultName;
  document.getElementById('edit-desc').value = ov.description || '';
  document.getElementById('edit-saved').classList.remove('show');

  // Populate category select
  const sel = document.getElementById('edit-cat');
  sel.innerHTML = '<option value="">Auto (par defaut)</option>';
  for (const cat of ALL_CATS) {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    if (ov.category === cat) opt.selected = true;
    sel.appendChild(opt);
  }

  document.getElementById('edit-overlay').classList.add('visible');
}

async function saveEdit() {
  if (!editPort) return;
  const name = document.getElementById('edit-name').value.trim();
  const description = document.getElementById('edit-desc').value.trim();
  const category = document.getElementById('edit-cat').value;

  const body = { port: editPort };
  if (name) body.name = name;
  if (description) body.description = description;
  if (category) body.category = category;

  try {
    await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    await loadConfig();
    render();
    document.getElementById('edit-saved').classList.add('show');
    setTimeout(() => document.getElementById('edit-saved').classList.remove('show'), 2000);
  } catch (err) {
    alert('Erreur: ' + err.message);
  }
}

async function resetEdit() {
  if (!editPort) return;
  try {
    await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ port: editPort })
    });
    await loadConfig();
    render();
    document.getElementById('edit-overlay').classList.remove('visible');
  } catch (err) {
    alert('Erreur: ' + err.message);
  }
}

// ── Events ──
document.addEventListener('DOMContentLoaded', () => {
  fetchSonar();

  document.getElementById('btn-refresh').addEventListener('click', fetchSonar);

  // Search
  let debounce;
  document.getElementById('search').addEventListener('input', (e) => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      searchQuery = e.target.value.toLowerCase().trim();
      render();
    }, 150);
  });

  // Filter buttons
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  // Sort buttons
  document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      render();
    });
  });

  // Next ports modal
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('btn-next').addEventListener('click', () => {
    overlay.classList.add('visible');
    document.getElementById('next-ports-result').innerHTML = '';
  });
  document.getElementById('modal-close').addEventListener('click', () => {
    overlay.classList.remove('visible');
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('visible');
  });
  document.getElementById('btn-find-next').addEventListener('click', () => {
    const fromPort = document.getElementById('next-from').value.trim();
    fetchNext(fromPort || null);
  });

  // Category toggle
  const toggleCats = document.getElementById('toggle-cats');
  toggleCats.addEventListener('click', () => {
    groupByCategory = !groupByCategory;
    toggleCats.classList.toggle('on', groupByCategory);
    render();
  });

  // Theme toggle (sun/moon icon)
  document.getElementById('btn-theme').addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    document.getElementById('icon-sun').style.display = isLight ? 'none' : 'block';
    document.getElementById('icon-moon').style.display = isLight ? 'block' : 'none';
  });

  // Logs modal
  const logsOverlay = document.getElementById('logs-overlay');
  document.getElementById('logs-close').addEventListener('click', () => {
    logsOverlay.classList.remove('visible');
    currentLogContainer = null;
  });
  logsOverlay.addEventListener('click', (e) => {
    if (e.target === logsOverlay) {
      logsOverlay.classList.remove('visible');
      currentLogContainer = null;
    }
  });
  document.getElementById('logs-refresh').addEventListener('click', fetchLogs);
  document.getElementById('logs-tail').addEventListener('change', fetchLogs);

  // Edit modal
  const editOverlay = document.getElementById('edit-overlay');
  document.getElementById('edit-close').addEventListener('click', () => {
    editOverlay.classList.remove('visible');
  });
  editOverlay.addEventListener('click', (e) => {
    if (e.target === editOverlay) editOverlay.classList.remove('visible');
  });
  document.getElementById('edit-save').addEventListener('click', saveEdit);
  document.getElementById('edit-reset').addEventListener('click', resetEdit);

  // View mode toggle (cards/list)
  document.getElementById('view-cards').addEventListener('click', () => {
    viewMode = 'cards';
    document.getElementById('view-cards').classList.add('active');
    document.getElementById('view-list').classList.remove('active');
    render();
  });
  document.getElementById('view-list').addEventListener('click', () => {
    viewMode = 'list';
    document.getElementById('view-list').classList.add('active');
    document.getElementById('view-cards').classList.remove('active');
    render();
  });
});
</script>
</body>
</html>
